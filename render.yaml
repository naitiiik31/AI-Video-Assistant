services:
  - type: web
    name: ai-video-assistant
    runtime: python
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && apt-get install -y ffmpeg || true"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: WHISPER_MODEL
        value: small
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_STT_MODEL
        value: saaras:v2.5
